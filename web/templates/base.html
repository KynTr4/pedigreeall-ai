<!doctype html>
<html lang="tr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            {% block title %}AT Yarış{% endblock %} · Shadow Dashboard
        </title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link href="/static/style.css" rel="stylesheet" />
    </head>
        <nav
            class="navbar navbar-expand-lg navbar-dark sticky-top"
            style="border-bottom: 1px solid var(--border, var(--line));"
        >
            <div class="container-fluid px-lg-4">
                <a class="navbar-brand fw-semibold d-flex align-items-center gap-1" href="/" style="font-size: 1.1rem; letter-spacing: -0.02em;"
                    >AT YARIŞ <span style="color: var(--accent);">SHADOW</span></a
                >
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#nav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div id="nav" class="collapse navbar-collapse d-lg-flex justify-content-between">
                    <div class="nav-tabs-custom mx-auto my-2 my-lg-0">
                        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Durum</a>
                        <a class="nav-link {% if request.url.path == '/races' %}active{% endif %}" href="/races">Yarış Günü</a>
                        <a class="nav-link {% if request.url.path == '/predictions' %}active{% endif %}" href="/predictions">Tahminler</a>
                        <a class="nav-link {% if request.url.path in ['/tjk-results', '/performance'] %}active{% endif %}" href="/tjk-results">Sonuçlar</a>
                        <a class="nav-link {% if request.url.path == '/bet-simulator' %}active{% endif %}" href="/bet-simulator">Bahis</a>
                        <a class="nav-link {% if request.url.path == '/shadow-monitor' %}active{% endif %}" href="/shadow-monitor">Shadow İzleme</a>
                        <div class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Diğer</a>
                            <ul class="dropdown-menu dropdown-menu-dark shadow border" style="background: var(--panel); border-color: var(--line) !important; font-size: 0.85rem;">
                                <li><a class="dropdown-item py-2" href="/performance">📊 Performans Analizi</a></li>
                                <li><a class="dropdown-item py-2" href="/diagnostics">🔬 Diagnostics</a></li>
                                <li><a class="dropdown-item py-2" href="/reports">📑 Raporlar</a></li>
                                <li><a class="dropdown-item py-2" href="/logs">📋 Sistem Logları</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="topbar-time ms-lg-0 mt-2 mt-lg-0">
                        <span id="header-timestamp">Son güncelleme: {% if data is defined and data.last_pipeline_at %}{{ data.last_pipeline_at }}{% endif %}</span>
                    </div>
                </div>
            </div>
        </nav>
        <main class="container-fluid px-lg-4 py-4">
            {% block content %}{% endblock %}
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const ts = document.getElementById('header-timestamp');
                if (ts && (!ts.textContent.trim() || ts.textContent.trim() === 'Son güncelleme:')) {
                    const now = new Date();
                    const pad = n => String(n).padStart(2, '0');
                    const dateStr = `${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
                    ts.textContent = `Son güncelleme: ${dateStr}`;
                }
            });
        </script>
    </body>
</html>
